name: Metrics

on:
  # 毎日 00:00 JST に再生成
  schedule:
    - cron: "0 15 * * *"
  # Actions タブから手動実行する用（初回生成はこれを使うと早い）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # 基本機能は GITHUB_TOKEN で動作する。
          # private contributions や一部プラグインを使いたい場合は、
          # PAT を作成して repo secret `METRICS_TOKEN` に登録し、下行を
          # `token: ${{ secrets.METRICS_TOKEN }}` に差し替える。
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ik11235
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Tokyo

          # --- ステータス本体（旧 Stats Card 相当）---
          base: header, activity, community, repositories, metadata

          # --- 使用言語の内訳 ---
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage

          # --- 実績バッジ（旧 trophy 相当）---
          plugin_achievements: yes
          plugin_achievements_threshold: C
